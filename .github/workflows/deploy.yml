name: Deploy PWA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Inject GitHub Token
        run: |
          # Заменяем плейсхолдер на реальный токен из секретов
          sed -i "s|__GITHUB_TOKEN_PLACEHOLDER__|${{ secrets.TOKEN_PWA }}|g" index.html
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages  # если используете отдельную ветку для Pages
